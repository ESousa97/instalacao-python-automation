name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint
        shell: pwsh
        run: ./scripts/lint.ps1

      - name: Test
        shell: pwsh
        run: ./tests/run.ps1

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1
